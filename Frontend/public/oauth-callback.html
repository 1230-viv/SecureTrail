<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub OAuth Callback</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3B82F6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Completing authentication...</h2>
        <p>Please wait while we redirect you back to the application.</p>
    </div>

    <script>
        // Get the authorization code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        
        if (code) {
            // Exchange code for token via backend
            fetch('http://localhost:8000/api/auth/github/callback?code=' + code)
                .then(response => response.json())
                .then(data => {
                    // Store token and user info
                    localStorage.setItem('github_token', data.access_token);
                    localStorage.setItem('github_user', JSON.stringify(data.user));
                    
                    // Redirect back to main app
                    window.location.href = '/';
                })
                .catch(error => {
                    console.error('Auth error:', error);
                    alert('Authentication failed. Please try again.');
                    window.location.href = '/';
                });
        } else {
            document.querySelector('.container').innerHTML = '<h2>Authentication failed</h2><p>Missing authorization code.</p>';
            setTimeout(() => window.location.href = '/', 2000);
        }
    </script>
</body>
</html>
